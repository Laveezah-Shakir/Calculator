<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>God-Level Calculator</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

*{box-sizing:border-box;font-family:'Poppins',sans-serif;margin:0;padding:0}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.calculator{
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.05);
    border-radius:20px;
    padding:20px;
    width:360px;
    box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

.display{
    width:100%;
    height:70px;
    border:none;
    border-radius:12px;
    padding:15px;
    font-size:28px;
    text-align:right;
    background:#000;
    color:#00ffff;
    margin-bottom:15px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
}

button{
    padding:14px;
    border:none;
    border-radius:12px;
    background:#1f1f2e;
    color:#fff;
    font-size:14px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#00ffff;
    color:#000;
    transform:scale(1.05);
}

.operator{background:#ff9500}
.equal{background:#00c853;grid-column:span 2}
.clear{background:#ff3d00}

.history{
    max-height:100px;
    overflow-y:auto;
    font-size:12px;
    color:#ccc;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="calculator">

<div class="history" id="history"></div>

<input type="text" id="display" class="display" disabled>

<div class="buttons">
<button class="clear" onclick="clearDisplay()">C</button>
<button onclick="append('(')">(</button>
<button onclick="append(')')">)</button>
<button onclick="append('%')">%</button>
<button onclick="append('/')">÷</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('*')">×</button>
<button onclick="sqrt()">√</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="append('-')">−</button>
<button onclick="power()">x²</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="append('+')">+</button>
<button onclick="log()">log</button>

<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button onclick="append(Math.PI)">π</button>
<button onclick="append(Math.E)">e</button>
<button class="equal" onclick="calculate()">=</button>

<button onclick="sin()">sin</button>
<button onclick="cos()">cos</button>
<button onclick="tan()">tan</button>
<button onclick="factorial()">n!</button>
<button onclick="backspace()">⌫</button>
</div>

</div>

<script>
let display=document.getElementById("display");
let historyDiv=document.getElementById("history");

function append(val){display.value+=val}

function clearDisplay(){display.value=""}

function backspace(){display.value=display.value.slice(0,-1)}

function calculate(){
    try{
        let result=eval(display.value);
        historyDiv.innerHTML+=display.value+" = "+result+"<br>";
        display.value=result;
    }catch{display.value="Error"}
}

function sqrt(){display.value=Math.sqrt(eval(display.value))}
function power(){display.value=Math.pow(eval(display.value),2)}
function log(){display.value=Math.log10(eval(display.value))}
function sin(){display.value=Math.sin(eval(display.value))}
function cos(){display.value=Math.cos(eval(display.value))}
function tan(){display.value=Math.tan(eval(display.value))}

function factorial(){
    let n=eval(display.value);
    if(n<0){display.value="Error";return}
    let res=1;
    for(let i=1;i<=n;i++)res*=i;
    display.value=res;
}

// Keyboard support
document.addEventListener("keydown",function(e){
    if(!isNaN(e.key)||"+-*/.%()".includes(e.key)) append(e.key);
    if(e.key==="Enter") calculate();
    if(e.key==="Backspace") backspace();
});
</script>

</body>
</html>
